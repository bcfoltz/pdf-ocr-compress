services:
  pdf-ocr-compress:
    build: .
    container_name: pdf-ocr-compress
    ports:
      # Bound to 127.0.0.1 only — single-machine assumption (no auth, no
      # CORS, batch endpoint accepts arbitrary server-side filesystem
      # paths). Drop the `127.0.0.1:` prefix only if you've put auth or
      # network ACLs in front. See docs/API.md.
      - "127.0.0.1:8501:8501"
      - "127.0.0.1:8502:8502"
    volumes:
      # Mount a local directory for processing files
      # Files placed in ./pdfs will be accessible in the container
      - ./pdfs:/pdfs
    environment:
      # Increase upload size limit (in MB)
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=4096
      - STREAMLIT_SERVER_MAX_MESSAGE_SIZE=4096
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8502/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

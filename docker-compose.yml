services:
  pdf-ocr-compress:
    build: .
    container_name: pdf-ocr-compress
    ports:
      - "8501:8501"
      - "8502:8502"
    volumes:
      # Mount a local directory for processing files
      # Files placed in ./pdfs will be accessible in the container
      - ./pdfs:/pdfs
    environment:
      # Increase upload size limit (in MB)
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=4096
      - STREAMLIT_SERVER_MAX_MESSAGE_SIZE=4096
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
